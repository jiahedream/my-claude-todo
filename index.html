<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">
        <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9,11 12,14 22,4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Todo
      </h1>
      <button class="theme-btn" id="themeBtn" aria-label="テーマ切替" title="テーマ切替">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </header>

    <form class="input-form" id="inputForm">
      <input
        type="text"
        class="input-field"
        id="inputField"
        placeholder="新しいタスクを追加... (Enter で確定)"
        autocomplete="off"
        maxlength="200"
      />
      <button type="submit" class="add-btn" title="追加">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </form>

    <div class="card">
      <nav class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="active">未完了</button>
        <button class="filter-btn" data-filter="completed">完了済み</button>
      </nav>

      <ul class="todo-list" id="todoList"></ul>

      <div class="empty-state" id="emptyState" hidden>
        <svg class="empty-icon" viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="16" y="8" width="48" height="64" rx="6"/>
          <line x1="28" y1="28" x2="52" y2="28"/>
          <line x1="28" y1="40" x2="52" y2="40"/>
          <line x1="28" y1="52" x2="44" y2="52"/>
          <circle cx="22" cy="28" r="3"/>
          <circle cx="22" cy="40" r="3"/>
          <circle cx="22" cy="52" r="3"/>
        </svg>
        <p id="emptyMessage">タスクを追加してみましょう</p>
        <span id="emptyHint">テキストを入力して Enter を押すか、+ ボタンをクリック</span>
      </div>

      <footer class="footer" id="footer" hidden>
        <span class="count" id="activeCount"></span>
        <button class="clear-btn" id="clearBtn" hidden>完了済みを削除</button>
      </footer>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
